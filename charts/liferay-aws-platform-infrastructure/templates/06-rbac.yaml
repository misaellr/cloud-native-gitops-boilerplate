{{- $crossplaneNamespace := .Values.crossplaneNamespace | default "crossplane-system" -}}

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "-40"
  labels:
    rbac.crossplane.io/aggregate-to-crossplane: "true"
  name: crossplane-provider-kubernetes
rules:
- apiGroups: [""]
  resources: ["secrets", "configmaps"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "-40"
  name: crossplane-provider-kubernetes-binding
subjects:
- kind: ServiceAccount
  name: provider-kubernetes
  namespace: {{ $crossplaneNamespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: crossplane-provider-kubernetes
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "-40"
  labels:
    rbac.crossplane.io/aggregate-to-crossplane: "true"
  name: crossplane-provider-aws
rules:
- apiGroups:
  - "s3.aws.m.upbound.io"
  - "rds.aws.m.upbound.io"
  - "aws.m.upbound.io"
  resources: ["*"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "-40"
  name: crossplane-provider-aws-binding
subjects:
- kind: ServiceAccount
  name: provider-aws-rds
  namespace: crossplane-system
- kind: ServiceAccount
  name: provider-aws-s3
  namespace: crossplane-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: crossplane-provider-aws
