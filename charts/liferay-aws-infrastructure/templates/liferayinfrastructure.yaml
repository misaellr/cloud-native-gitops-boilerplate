{{- if .Values.enabled -}}
{{- $db := .Values.database | default dict -}}
{{- $dbBlue := $db.blue | default dict -}}
{{- $dbGreen := $db.green | default dict -}}
{{- $search := .Values.search | default dict -}}
{{- $storage := .Values.storage | default dict -}}
{{- $storageBlue := $storage.blue | default dict -}}
{{- $storageGreen := $storage.green | default dict -}}

apiVersion: aws.liferay.com/v1alpha1
kind: LiferayInfrastructure
metadata:
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
    argocd.argoproj.io/sync-wave: "-20"
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  commonTags:
    EnvironmentId: {{ .Values.environmentId }}
    ProjectId: {{ .Values.projectId }}
  database:
    activeSlot: {{ default "blue" $db.activeSlot | quote }}
    blue:
      instanceClass: {{ $dbBlue.instanceClass | default "db.t3.medium" | quote }}
      username: {{ $dbBlue.username | default "liferay_database_admin" | quote }}
      region: {{ $dbBlue.region | default "us-west-2" | quote }}
      storageGB: {{ $dbBlue.storageGB | default 20 }}
    green:
      instanceClass: {{ $dbGreen.instanceClass | default "db.t3.medium" | quote }}
      username: {{ $dbGreen.username | default "liferay_database_admin" | quote }}
      region: {{ $dbGreen.region | default "us-west-2" | quote }}
      storageGB: {{ $dbGreen.storageGB | default 20 }}
  deletionProtection: {{ .Values.deletionProtection | default false }}
  environmentId: {{ .Values.environmentId }}
  projectId: {{ .Values.projectId }}
  search:
    engineVersion: {{ $search.engineVersion | default "OpenSearch_2.15" | quote }}
    instanceCount: {{ $search.instanceCount | default 2 }}
    instanceType: {{ $search.instanceType | default "t3.small.search" | quote }}
    region: {{ $search.region | default "us-west-2" | quote }}
    username: {{ $search.username | default "liferay_search_admin" | quote }}
  storage:
    activeSlot: {{ $storage.activeSlot | default "blue" | quote }}
    blue:
      enableVersioning: {{ $storageBlue.enableVersioning | default true }}
      region: {{ $storageBlue.region | default "us-west-2" | quote }}
    green:
      enableVersioning: {{ $storageGreen.enableVersioning | default true }}
      region: {{ $storageGreen.region | default "us-west-2" | quote }}
{{- end -}}
