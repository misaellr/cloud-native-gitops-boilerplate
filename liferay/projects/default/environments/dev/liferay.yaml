liferay-default:
  resources:
    requests:
      cpu: "8"
      memory: 8Gi
    limits:
      cpu: "8"
      memory: 8Gi
  network:
    enabled: true
    endpointRef: misaelneto
    forceHttpsRedirect: true
    hostnames:
      - "dev-aws.misaelneto.com"
  portalProperties: |
    company.default.virtual.host.name=dev-aws.misaelneto.com
    company.default.web.id=dev-aws.misaelneto.com
    company.default.virtual.host.mail.domain=misaelneto.com
    setup.wizard.enabled=false
    #
    # Feature Flags (migrated from PaaS lctpendotagging-uat 2025.q4.7)
    #
    feature.flag.LPS-164563=true
    feature.flag.LPD-34594=true
    feature.flag.LPS-178642=true
    feature.flag.LPD-63311=true
    feature.flag.LPD-62272=true
    feature.flag.LPD-11235=true
    #
    # Headless REST API auth
    #
    auth.verifier.BasicAuthHeaderAuthVerifier.urls.includes=/api/*,/xmlrpc/*,/o/*
    access.control.sanitize.security.exception=false
    #
    # Session timeout (extended for demo)
    #
    session.timeout=525600
    session.timeout.warning=0
    #
    # Default Landing Page
    #
    default.landing.page.path=/web/raymont/home-content
    company.default.home.url=/web/raymont/home-content
    #
    # Mail Server (SparkPost SMTP relay)
    # TODO: Move password to Secrets Manager via ESO (no documented CNE path for SMTP secrets)
    #
    mail.session.mail.smtp.auth=true
    mail.session.mail.smtp.host=smtp.sparkpostmail.com
    mail.session.mail.smtp.port=587
    mail.session.mail.smtp.starttls.enable=true
    mail.session.mail.smtp.user=SMTP_Injection
    mail.session.mail.smtp.password=6ba28d1a1c8a57d35ef91b3f768c29fda5a55686
    mail.session.mail.transport.protocol=smtp
    admin.email.from.name=Raymont Industries
    admin.email.from.address=no-reply@raymont.com
