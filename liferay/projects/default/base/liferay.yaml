liferay-default:
  replicaCount: 1
  image:
    tag: "2025.q4.12"
  annotations:
    instrumentation.opentelemetry.io/inject-java: "false"
  configmap:
    data:
      com.liferay.portal.search.opensearch2.configuration.OpenSearchConfiguration.config: |
        remoteClusterConnectionId="REMOTE"
      com.liferay.portal.search.opensearch2.configuration.OpenSearchConnectionConfiguration-REMOTE.config: |
        active=B"true"
        authenticationEnabled=B"true"
        connectionId="REMOTE"
        httpSSLEnabled=B"false"
        networkHostAddresses=["https://$[env:OPENSEARCH_ENDPOINT]"]
        password="$[env:OPENSEARCH_PASSWORD]"
        username="$[env:OPENSEARCH_USERNAME]"
  portalBundleDenyList:
    - com.liferay.portal.search.elasticsearch.cross.cluster.replication.impl
    - com.liferay.portal.search.elasticsearch.monitoring.web
    - com.liferay.portal.search.elasticsearch8.api
    - com.liferay.portal.search.elasticsearch8.impl
    - com.liferay.portal.search.learning.to.rank.api
    - com.liferay.portal.search.learning.to.rank.impl
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::294825482201:role/misael-cne-irsa
  startupProbe:
    failureThreshold: 180
    httpGet:
      path: /c/portal/robots
      port: http
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
  securityContext:
    readOnlyRootFilesystem: false
    capabilities:
      drop: []
    runAsNonRoot: false
    runAsUser: 0
  podSecurityContext:
    fsGroup: 0
    runAsUser: 0
    runAsNonRoot: false
  customInitContainers:
    x-liferay-install-opensearch-modules:
      - command:
          - bash
          - -c
          - |
            function download_module {
                local product_version="2025.q4.11"
                local url="https://releases.liferay.com/opensearch2/dxp/${product_version}/com.liferay.portal.search.opensearch2.${1}.jar"
                local http_code=$(curl --location --output-dir /temp/liferay/deploy --remote-name --retry 5 --retry-all-errors --retry-delay 2 --write-out "%{http_code}" "${url}")
                if [ "${http_code}" != "200" ]; then
                    echo "Unable to download OpenSearch modules for product version ${product_version}." >&2
                    exit 1
                fi
            }
            function main {
                mkdir --parents /temp/liferay/deploy
                rm --force --verbose "/temp/osgi/modules/com.liferay.portal.search.opensearch2"*
                download_module "api"
                download_module "impl"
            }
            main
        image: liferay/dxp:2025.q4.12
        imagePullPolicy: IfNotPresent
        name: liferay-install-opensearch-modules
        volumeMounts:
          - mountPath: /temp
            name: liferay-persistent-volume
  customEnv:
    x-license:
      - name: LIFERAY_DISABLE_TRIAL_LICENSE
        value: "true"
  customVolumeMounts:
    x-opensearch:
      - mountPath: /opt/liferay/osgi/configs/com.liferay.portal.search.opensearch2.configuration.OpenSearchConfiguration.config
        name: liferay-configmap
        subPath: com.liferay.portal.search.opensearch2.configuration.OpenSearchConfiguration.config
      - mountPath: /opt/liferay/osgi/configs/com.liferay.portal.search.opensearch2.configuration.OpenSearchConnectionConfiguration-REMOTE.config
        name: liferay-configmap
        subPath: com.liferay.portal.search.opensearch2.configuration.OpenSearchConnectionConfiguration-REMOTE.config
    x-license:
      - mountPath: /etc/liferay/mount/files/deploy
        name: license
  customVolumes:
    x-license:
      - name: license
        secret:
          secretName: liferay-license
          items:
            - key: license.xml
              path: license.xml
