liferay-default:
  configmap:
    annotations:
      argocd.argoproj.io/compare-options: IgnoreExtraneous
      argocd.argoproj.io/sync-options: Prune=false
  customInitContainers:
    x-liferay-prewipe-hypersonic:
      - containerTemplate: |
          - command:
              - bash
              - -c
              - |
                  FLAGFILE=/opt/liferay/data/.hypersonic.prewiped

                  if [ ! -e "${FLAGFILE}" ]
                  then
                    rm -rf /opt/liferay/data/hypersonic

                    touch "${FLAGFILE}"
                  fi
            image: {{ printf "%s:%s" .image.repository (.image.tag | toString) }}
            imagePullPolicy: {{ .image.pullPolicy }}
            name: liferay-prewipe-hypersonic
            volumeMounts:
              - mountPath: /opt
                name: liferay-persistent-volume
  image:
    tag: 2025.q1.20-lts
  ingress:
    annotations:
      nginx.ingress.kubernetes.io/affinity: "cookie"
      nginx.ingress.kubernetes.io/proxy-body-size: "0"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
      nginx.ingress.kubernetes.io/session-cookie-name: "LiferaySticky"
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
    className: "nginx"
    enabled: true
    rules:
    - http:
        paths:
        - backend:
            service:
              name: liferay-default
              port:
                name: http
          path: /
          pathType: ImplementationSpecific
  portalProperties: |
    com.liferay.portal.servlet.filters.secure.SecureFilter=true
    com.liferay.portal.upload.UploadServletRequestImpl.max.size=0
    proxy.forwarded.for.header=X-Forwarded-For
    proxy.forwarded.host.header=X-Forwarded-Host
    proxy.forwarded.proto.header=X-Forwarded-Proto
    web.server.display.node.port=false
    web.server.forwarded.port.enabled=true
    web.server.forwarded.protocol.enabled=true
    web.server.http.port=80
    web.server.https.port=443
    web.server.protocol=http
  resources:
    limits:
      cpu: 4000m
      memory: 12Gi
    requests:
      cpu: 2000m
      memory: 4Gi
  volumeClaimTemplates:
    - apiVersion: v1	
      kind: PersistentVolumeClaim	
      metadata:
        name: liferay-persistent-volume
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 20Gi
        storageClassName: gp3
